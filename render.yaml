databases:
  - name: mn-check-db
    plan: free
    databaseName: mn_check
    user: mn_check

services:
  - type: web
    name: mm-check
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 4173
      - key: DATABASE_URL
        fromDatabase:
          name: mn-check-db
          property: connectionString
      - key: MMCHECK_DB_PATH
        value: /app/data/java-db.json
      - key: MMCHECK_UPLOAD_DIR
        value: /app/data/uploads
      - key: MMCHECK_ADMIN_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
