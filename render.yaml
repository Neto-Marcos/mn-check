services:
  - type: web
    name: mm-check
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 4173
      - key: MMCHECK_DB_PATH
        value: /app/data/java-db.json
      - key: MMCHECK_UPLOAD_DIR
        value: /app/data/uploads
      - key: MMCHECK_ADMIN_PASSWORD
        sync: false
