name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: mn_check_test
          POSTGRES_USER: mn_check
          POSTGRES_PASSWORD: mn_check_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mn_check -d mn_check_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://mn_check:mn_check_test@localhost:5432/mn_check_test?sslmode=disable
      MMCHECK_ADMIN_PASSWORD: ci-password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Check frontend syntax
        run: node --check frontend/app.js
      - name: Test parser and PostgreSQL persistence
        run: mvn --batch-mode --no-transfer-progress test
      - name: Build backend
        run: mvn --batch-mode --no-transfer-progress -DskipTests package
      - name: Smoke test API
        run: |
          java -jar target/mn-check-1.6.3.jar > /tmp/mn-check.log 2>&1 &
          SERVER_PID=$!
          sleep 6
          curl --fail http://127.0.0.1:4173/api/health
          curl --fail http://127.0.0.1:4173/api/version | grep '"version":"1.6.3"'
          kill $SERVER_PID
          cat /tmp/mn-check.log
      - name: Build production image
        run: docker build -t mn-check-ci .
